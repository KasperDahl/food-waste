name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger from the Actions tab

# Required permissions for the official GitHub Pages deployment actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time; cancel in-flight runs on new pushes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # URL of your Cloudflare Worker proxy (see worker/index.js for setup).
          # Add this as a GitHub repo secret: Settings → Secrets and variables → Actions → API_WORKER_URL
          VITE_API_URL: ${{ secrets.API_WORKER_URL }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
